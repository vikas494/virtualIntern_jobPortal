<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Job Portal</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Create your account</h1>
            <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem;">Join to apply or post jobs</p>
        </div>

        <div class="card">
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label for="skills">Skills (comma separated)</label>
                    <input type="text" id="skills" class="form-control" placeholder="HTML, CSS, JavaScript">
                </div>

                <div class="form-group">
                    <label for="role">I am a...</label>
                    <select id="role" class="form-control">
                        <option value="user">Job Seeker</option>
                        <option value="admin">Company (Post Jobs)</option>
                    </select>
                </div>

                <button type="submit" class="btn">Sign Up</button>
            </form>
            <div id="message"></div>
        </div>

        <div class="form-footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script src="./js/register.js"></script>
</body>
</html>
