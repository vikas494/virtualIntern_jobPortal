<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job | Job Portal</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">JobPortal <span style="font-size: 0.8rem; color: var(--text-muted);">Admin</span></div>
        <div class="nav-actions">
            <button onclick="window.location.href='index.html'" class="btn btn-outline" style="width: auto;">Back to Feed</button>
        </div>
    </nav>

    <div class="auth-container" style="max-width: 600px; margin-top: 2rem; margin-bottom: 2rem;">
        <div class="auth-header">
            <h1>Create a Job Listing</h1>
            <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem;">Fill out the details below to post a new role.</p>
        </div>

        <div class="card">
            <form id="postJobForm">
                <div class="form-group">
                    <label for="title">Job Title</label>
                    <input type="text" id="title" class="form-control" required placeholder="e.g. Frontend Developer">
                </div>
                
                <div class="form-group">
                    <label for="company">Company Name</label>
                    <input type="text" id="company" class="form-control" required placeholder="e.g. TechCorp Inc.">
                </div>

                <div class="form-group">
                    <label for="skills_required">Required Skills (comma separated)</label>
                    <input type="text" id="skills_required" class="form-control" required placeholder="e.g. React, Node.js, MongoDB">
                </div>

                <div class="form-group">
                    <label for="description">Job Description</label>
                    <textarea id="description" class="form-control" required rows="5" placeholder="Describe the role and responsibilities..." style="resize: vertical;"></textarea>
                </div>

                <button type="submit" class="btn">Post Job</button>
            </form>
            <div id="message"></div>
        </div>
    </div>

    <script src="./js/post-job.js"></script>
</body>
</html>
