<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Job Portal</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Welcome back</h1>
            <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem;">Sign in to your account</p>
        </div>

        <div class="card">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn">Sign In</button>
            </form>
            <div id="message"></div>
        </div>

        <div class="form-footer">
            New to the portal? <a href="register.html">Create an account</a>
        </div>
    </div>

    <script src="./js/login.js"></script>
</body>
</html>
